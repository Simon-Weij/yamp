name: ci

on:
  push:
  pull_request:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: go test ./...

  modtidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - run: go mod tidy && git diff --exit-code go.mod go.sum

  format-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - run: test -z "$(gofmt -l .)"

  govet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: go vet ./...

